<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="512" height="512" rx="120" fill="white"/>
  <defs>
    <linearGradient id="threadGradient" x1="100" y1="400" x2="400" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E40AF"/> 
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <filter id="dropshadow" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15"/> 
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#dropshadow)">
    <path d="M140 140 
             C 140 140, 140 380, 140 380 
             L 220 300 
             L 300 380 
             L 400 180" 
          stroke="url(#threadGradient)" 
          stroke-width="40" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    <circle cx="140" cy="120" r="15" fill="#1E40AF" />
    <circle cx="220" cy="300" r="12" fill="#0D9488" />
    <circle cx="300" cy="380" r="12" fill="#0D9488" />
    <circle cx="400" cy="180" r="18" fill="#F59E0B" />
  </g>
</svg>