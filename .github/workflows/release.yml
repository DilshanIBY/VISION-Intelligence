# APPAREL Release Pipeline
# Builds and releases professional installers for all platforms
#
# Generated Installers:
# - Windows: .msi (MSI Installer), .exe (NSIS Installer)
# - macOS: .dmg (Disk Image), .app (Application Bundle)
# - Linux: .deb (Debian), .AppImage (Universal)

name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  build-tauri:
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    name: Build ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis

          - os: macos-latest
            target: universal-apple-darwin
            bundles: dmg

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage

    runs-on: ${{ matrix.settings.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.settings.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.settings.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Strip the leading 'v' from the tag (e.g. v1.2.3 -> 1.2.3)
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            # Auto-generate version from run number for main branch pushes
            VERSION="0.1.${{ github.run_number }}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Set version in config files
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Patching version to $VERSION in all config files..."

          # Update tauri.conf.json
          cd src-tauri
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('tauri.conf.json', 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync('tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          cd ..

          # Update package.json
          npm version "$VERSION" --no-git-tag-version --allow-same-version

          # Update Cargo.toml (using node for cross-platform compatibility)
          node -e "
            const fs = require('fs');
            let toml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            toml = toml.replace(/^version = \".*\"/m, 'version = \"$VERSION\"');
            fs.writeFileSync('src-tauri/Cargo.toml', toml);
          " 

          echo "✅ All config files patched to version $VERSION"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app (Release)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'APPAREL ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.settings.target }} --bundles ${{ matrix.settings.bundles }}

      - name: Build Tauri app (Push to main)
        if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: 'v${{ steps.version.outputs.VERSION }}'
          releaseName: 'APPAREL v${{ steps.version.outputs.VERSION }}'
          releaseBody: 'Automated release from main branch.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.settings.target }} --bundles ${{ matrix.settings.bundles }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.settings.os }}
          path: |
            src-tauri/target/${{ matrix.settings.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.settings.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.settings.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.settings.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.settings.target }}/release/bundle/**/*.AppImage
          if-no-files-found: ignore
