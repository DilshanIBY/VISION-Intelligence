# APPAREL Release Pipeline
# Builds and releases professional installers for all platforms
#
# Generated Installers:
# - Windows: .msi (MSI Installer), .exe (NSIS Installer)
# - macOS: .dmg (Disk Image), .app (Application Bundle)
# - Linux: .deb (Debian), .rpm (Red Hat), .AppImage (Universal)

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.get-version.outputs.version }}`,
              name: `APPAREL v${{ steps.get-version.outputs.version }}`,
              body: `## APPAREL v${{ steps.get-version.outputs.version }}

### Downloads

| Platform | Installer | Type |
|----------|-----------|------|
| Windows | \`.msi\` | MSI Installer (Recommended) |
| Windows | \`.exe\` | NSIS Installer |
| macOS | \`.dmg\` | Disk Image |
| Linux | \`.deb\` | Debian Package |
| Linux | \`.AppImage\` | Universal Linux |

### Installation

#### Windows
1. Download the \`.msi\` or \`.exe\` installer
2. Run the installer and follow the prompts
3. Launch APPAREL from the Start Menu

#### macOS
1. Download the \`.dmg\` file
2. Open the DMG and drag APPAREL to Applications
3. Launch APPAREL from Applications

#### Linux
- **Debian/Ubuntu**: \`sudo dpkg -i apparel_*.deb\`
- **AppImage**: Make executable and run: \`chmod +x APPAREL_*.AppImage && ./APPAREL_*.AppImage\`

---
See [CHANGELOG](CHANGELOG.md) for detailed changes.`,
              draft: true,
              prerelease: false
            });
            return data.id;

  build-tauri:
    name: Build ${{ matrix.settings.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        settings:
          # Windows builds
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis

          # macOS builds (Universal binary for Intel + Apple Silicon)
          - os: macos-latest
            target: universal-apple-darwin
            bundles: dmg

          # Linux builds
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage

    runs-on: ${{ matrix.settings.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.settings.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.settings.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.settings.target }} --bundles ${{ matrix.settings.bundles }}

  publish-release:
    name: Publish Release
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            });
            console.log('✅ Release published successfully!');
